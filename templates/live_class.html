<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }} - Live Video Class</title>
    <!-- Inject Jitsi API -->
    <script src="https://meet.jit.si/external_api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 0; background-color: #0f1115; font-family: 'Inter', sans-serif; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .top-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 20px; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .title { color: #fff; font-weight: 600; font-size: 16px; display:flex; align-items:center; gap: 10px; }
        .recording-dot { width: 10px; height: 10px; background: #ef4444; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .premium-btn { background: rgba(59, 130, 246, 0.2); color: #60a5fa; border: 1px solid rgba(59, 130, 246, 0.4); padding: 8px 16px; border-radius: 8px; font-size: 13px; text-decoration: none; cursor: pointer; transition: 0.2s; }
        .premium-btn:hover { background: rgba(59, 130, 246, 0.3); }
        #jitsi-container { flex-grow: 1; width: 100%; border: none; }
        .status-badge { background: rgba(245, 158, 11, 0.2); color: #f59e0b; padding: 4px 10px; border-radius: 20px; font-size: 11px; border: 1px solid rgba(245, 158, 11, 0.4); }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="title">
            <span class="recording-dot"></span>
            {{ title }}
        </div>
        <div style="display:flex; align-items:center; gap: 15px;">
            {% if role == 'admin' %}
            <span class="status-badge">Host / Moderator Active</span>
            {% else %}
            <span class="status-badge" style="background: rgba(52, 211, 153, 0.2); color: #34d399; border-color: rgba(52, 211, 153, 0.4);">Student Access</span>
            {% endif %}
            <a href="{{ url_for('home') if role == 'admin' else url_for('student_dashboard') }}" class="premium-btn">Return to Portal</a>
        </div>
    </div>

    <div id="jitsi-container"></div>

    <script>
        // Note: Free Jitsi meet instance auto-grants Moderator to the first participant who boots the room.
        // Admins should always click 'Host Space' first to claim the Moderator tokens and establish the security Lobby.
        
        const domain = 'meet.jit.si';
        const options = {
            roomName: 'EduSync-Classroom-' + '{{ meet_code }}',
            width: '100%',
            height: '100%',
            parentNode: document.querySelector('#jitsi-container'),
            userInfo: {
                displayName: '{{ display_name }}'
            },
            configOverwrite: {
                // Forces hardware routing prompt for Mic/Camera/Bluetooth selectors
                prejoinPageEnabled: true,
                startWithAudioMuted: true,
                startWithVideoMuted: true,
                // Enable Whiteboard 
                whiteboard: {
                    enabled: true,
                    collabServerBaseUrl: 'https://excalidraw-backend.jitsi.net'
                }
            },
            interfaceConfigOverwrite: {
                SHOW_PROMOTIONAL_CLOSE_PAGE: false,
                DISABLE_SERVER_COMMUNICATION: true, // Removes some telemetry 
                TOOLBAR_BUTTONS: [
                    'microphone', 'camera', 'desktop', 'fullscreen',
                    'fodeviceselection', 'profile', 'chat', 'settings', 'raisehand',
                    'videoquality', 'filmstrip', 'invite', 'mute-everyone', 'security', 'whiteboard'
                ]
            }
        };

        const api = new JitsiMeetExternalAPI(domain, options);
    </script>
</body>
</html>
